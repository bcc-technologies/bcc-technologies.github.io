<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none">
  <style>
    .beam{animation:beamA 3.2s ease-in-out infinite}
    .dot{animation:dotA 4.2s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
    .bar{animation:barA 5s ease-in-out infinite;transform-origin:center bottom;transform-box:fill-box}
    @keyframes beamA{0%,100%{opacity:.46}50%{opacity:1}}
    @keyframes dotA{0%,100%{transform:translate(0,0)}50%{transform:translate(2px,-3px)}}
    @keyframes barA{0%,100%{transform:scaleY(.76)}50%{transform:scaleY(1)}}
    @media (prefers-reduced-motion: reduce){.beam,.dot,.bar{animation:none!important}}
  </style>
  <defs>
