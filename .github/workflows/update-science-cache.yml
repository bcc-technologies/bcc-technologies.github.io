name: Update science cache

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update cache
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: node scripts/update-science-cache.mjs

      - name: Commit and push
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "bcc-science-bot"
          git config user.email "bot@users.noreply.github.com"
          git add static/data/arxiv.json static/data/nasa-apod.json
          git commit -m "chore: update science cache"
          git push
