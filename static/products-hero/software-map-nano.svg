    <ellipse cx="276" cy="199" rx="10" ry="7" transform="rotate(-11 276 199)" class="grain light pulse-b"/>
    <ellipse cx="301" cy="193" rx="13" ry="8" transform="rotate(8 301 193)" class="grain"/>

    <ellipse cx="114" cy="223" rx="8" ry="5" transform="rotate(10 114 223)" class="grain tiny twinkle"/>
    <ellipse cx="138" cy="226" rx="12" ry="8" transform="rotate(-9 138 226)" class="grain mid float-a"/>
    <ellipse cx="164" cy="228" rx="18" ry="11" transform="rotate(7 164 228)" class="grain dark pulse-a"/>
    <ellipse cx="193" cy="223" rx="10" ry="7" transform="rotate(-6 193 223)" class="grain light"/>
    <ellipse cx="218" cy="229" rx="15" ry="10" transform="rotate(12 218 229)" class="grain float-b"/>
    <ellipse cx="246" cy="224" rx="10" ry="7" transform="rotate(-8 246 224)" class="grain mid"/>
    <ellipse cx="271" cy="229" rx="18" ry="12" transform="rotate(8 271 229)" class="grain dark float-c"/>
    <ellipse cx="300" cy="225" rx="11" ry="7" transform="rotate(-10 300 225)" class="grain light pulse-b"/>

    <ellipse cx="121" cy="254" rx="11" ry="7" transform="rotate(-8 121 254)" class="grain mid pulse-b"/>
    <ellipse cx="148" cy="256" rx="9" ry="6" transform="rotate(13 148 256)" class="grain light"/>
    <ellipse cx="174" cy="258" rx="17" ry="11" transform="rotate(-5 174 258)" class="grain dark float-a"/>
    <ellipse cx="201" cy="253" rx="11" ry="7" transform="rotate(9 201 253)" class="grain light pulse-a"/>
    <ellipse cx="228" cy="259" rx="18" ry="11" transform="rotate(-7 228 259)" class="grain dark float-c"/>
    <ellipse cx="258" cy="254" rx="10" ry="7" transform="rotate(14 258 254)" class="grain mid"/>
    <ellipse cx="284" cy="261" rx="14" ry="9" transform="rotate(-9 284 261)" class="grain light pulse-b"/>

    <ellipse cx="133" cy="284" rx="9" ry="6" transform="rotate(5 133 284)" class="grain tiny twinkle"/>
    <ellipse cx="157" cy="288" rx="13" ry="8" transform="rotate(-12 157 288)" class="grain mid pulse-a"/>
    <ellipse cx="185" cy="289" rx="10" ry="7" transform="rotate(8 185 289)" class="grain light"/>
    <ellipse cx="269" cy="286" rx="10" ry="7" transform="rotate(-6 269 286)" class="grain mid"/>

    <!-- small fillers -->
    <ellipse cx="149" cy="149" rx="6.2" ry="4.2" transform="rotate(-8 149 149)" class="grain tiny twinkle"/>
    <ellipse cx="175" cy="155" rx="7" ry="4.8" transform="rotate(7 175 155)" class="grain tiny"/>
    <ellipse cx="203" cy="150" rx="6.4" ry="4.2" transform="rotate(-11 203 150)" class="grain tiny twinkle"/>
    <ellipse cx="228" cy="152" rx="7.2" ry="4.9" transform="rotate(5 228 152)" class="grain tiny"/>
    <ellipse cx="255" cy="151" rx="6.2" ry="4.1" transform="rotate(10 255 151)" class="grain tiny twinkle"/>
    <ellipse cx="283" cy="154" rx="6.5" ry="4.3" transform="rotate(-9 283 154)" class="grain tiny"/>

    <ellipse cx="128" cy="180" rx="6.8" ry="4.5" transform="rotate(8 128 180)" class="grain tiny twinkle"/>
    <ellipse cx="156" cy="184" rx="7.4" ry="5" transform="rotate(-5 156 184)" class="grain tiny"/>
    <ellipse cx="183" cy="181" rx="6.2" ry="4.1" transform="rotate(12 183 181)" class="grain tiny"/>
    <ellipse cx="211" cy="183" rx="7" ry="4.8" transform="rotate(-8 211 183)" class="grain tiny twinkle"/>
    <ellipse cx="236" cy="183" rx="6.2" ry="4.2" transform="rotate(6 236 183)" class="grain tiny"/>
    <ellipse cx="264" cy="184" rx="7.2" ry="4.8" transform="rotate(-10 264 184)" class="grain tiny"/>
    <ellipse cx="291" cy="181" rx="6.2" ry="4.1" transform="rotate(9 291 181)" class="grain tiny twinkle"/>

    <ellipse cx="129" cy="210" rx="6.2" ry="4.1" transform="rotate(-9 129 210)" class="grain tiny"/>
    <ellipse cx="154" cy="212" rx="7.4" ry="5" transform="rotate(8 154 212)" class="grain tiny twinkle"/>
    <ellipse cx="180" cy="210" rx="6.4" ry="4.2" transform="rotate(-5 180 210)" class="grain tiny"/>
    <ellipse cx="208" cy="212" rx="6.8" ry="4.4" transform="rotate(6 208 212)" class="grain tiny"/>
