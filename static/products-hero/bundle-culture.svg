<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="70 105 520 245"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">EIS + MAP-Bio bundle for adherent cell culture supervision</title>
  <desc id="desc">
    Clean infographic SVG showing AquaSpecter EIS and MAP-Bio vision monitoring
    an adherent cell culture dish, with both signals integrated into a supervision panel.
  </desc>

  <style>
    :root{
      --ink-1:#9bb2ca;
      --ink-2:#5f7e9e;
      --ink-3:#324a63;

      --blue-0:#f8fbff;
      --blue-1:#dbeafe;
      --blue-2:#93c5fd;
      --blue-3:#60a5fa;
      --blue-4:#2563eb;

      --amber-1:#fde68a;
      --amber-2:#f59e0b;

      --panel-fill:rgba(255,255,255,.95);
      --panel-stroke:rgba(50,74,99,.14);
      --grid:rgba(95,126,158,.08);
    }

    .label{
      font:600 10px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-2);
      letter-spacing:.06px;
    }

    .label-strong{
      font:700 11px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-3);
      letter-spacing:.06px;
    }

    .small{
      font:600 8.7px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:rgba(95,126,158,.78);
      letter-spacing:.03px;
    }

    .tiny{
      font:700 7.5px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:rgba(95,126,158,.72);
      letter-spacing:.03px;
    }

    .module-dark{
      fill:#0f172a;
      filter:url(#shadow-soft);
    }

    .module-light{
      fill:#ffffff;
      stroke:#bfd7ee;
      stroke-width:2;
      filter:url(#shadow-soft);
    }

    .screen{
      fill:#eff6ff;
      stroke:#d8e3ef;
      stroke-width:1.1;
    }

    .screen-track{
      stroke:#d7e2ee;
      stroke-width:2.6;
      stroke-linecap:round;
    }

    .screen-fill-blue{
      stroke:var(--blue-4);
      stroke-width:2.6;
      stroke-linecap:round;
      animation:pulse 4.8s ease-in-out infinite;
    }

    .screen-fill-amber{
      stroke:var(--amber-2);
      stroke-width:2.6;
      stroke-linecap:round;
      animation:pulse 4.8s ease-in-out infinite;
      animation-delay:-1.1s;
    }

    .port{
      fill:#ffffff;
      stroke:#8aa4bf;
      stroke-width:1.1;
    }

    .lead{
      fill:none;
      stroke:rgba(155,178,202,.78);
      stroke-width:1.95;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .lead-light{
      fill:none;
      stroke:rgba(191,208,225,.72);
      stroke-width:1.45;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .signal-ac{
      fill:none;
      stroke:var(--amber-2);
      stroke-width:1.75;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:7 10;
      animation:flow 5.2s linear infinite;
      opacity:.88;
    }

    .signal-blue{
      fill:none;
      stroke:var(--blue-4);
      stroke-width:1.75;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:7 10;
      animation:flow 6s linear infinite reverse;
      opacity:.88;
    }

    .vision{
      fill:none;
      stroke:rgba(37,99,235,.34);
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-dasharray:4 8;
      animation:flow 6.5s linear infinite;
    }

    .vision-cone{
      fill:rgba(37,99,235,.05);
      stroke:rgba(37,99,235,.10);
      stroke-width:1;
    }

    .dish-shadow{
      fill:rgba(37,99,235,.07);
      filter:url(#blur-soft);
    }

    .dish-outer{
      fill:#ffffff;
      stroke:#bfd7ee;
      stroke-width:3;
      filter:url(#shadow-soft);
    }

    .dish-inner{
      fill:url(#dish-fill);
      stroke:rgba(147,197,253,.34);
      stroke-width:1.6;
    }

    .dish-base{
      fill:rgba(147,197,253,.08);
      stroke:rgba(95,126,158,.16);
      stroke-width:1.2;
    }

    .electrode{
      fill:url(#electrode-fill);
      stroke:#8aa4bf;
      stroke-width:.9;
      opacity:.78;
    }

    .electrode-signal{
      fill:none;
      stroke-width:1.3;
      stroke-linecap:round;
      stroke-dasharray:4 6;
      opacity:.82;
      animation:flow 6.2s linear infinite;
    }

    .electrode-signal.amber{ stroke:var(--amber-2); }
    .electrode-signal.blue{ stroke:var(--blue-4); }

    .cell{
      fill:url(#cell-fill);
      stroke:rgba(37,99,235,.30);
      stroke-width:1.05;
      filter:url(#particle-shadow);
      transform-origin:center;
      transform-box:fill-box;
      animation:cellFloat 6.5s ease-in-out infinite;
    }

    .cell.alt{
      fill:url(#cell-fill-alt);
      animation-delay:-1.3s;
    }

    .cell-outline{
      fill:none;
      stroke:rgba(37,99,235,.24);
      stroke-width:1;
      stroke-dasharray:3 5;
      animation:flow 7s linear infinite;
    }

    .nucleus{
      fill:#2563eb;
      opacity:.58;
    }

    .nucleus.alt{
      fill:#f59e0b;
      opacity:.52;
    }

    .data-line{
      fill:none;
      stroke:rgba(95,126,158,.22);
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:4 10;
      animation:flow 7.5s linear infinite;
    }

    .panel{
      fill:var(--panel-fill);
      stroke:var(--panel-stroke);
      stroke-width:1.5;
      filter:url(#shadow-panel);
    }

    .divider{
      stroke:rgba(50,74,99,.10);
      stroke-width:1;
    }

    .axis{
      stroke:rgba(95,126,158,.22);
      stroke-width:1.05;
      stroke-linecap:round;
    }

    .grid{
      stroke:var(--grid);
      stroke-width:1;
    }

    .trend{
      fill:none;
      stroke:var(--blue-4);
      stroke-width:2.3;
      stroke-linecap:round;
      stroke-linejoin:round;
      animation:pulse 4.8s ease-in-out infinite;
    }

    .trend.soft{
      stroke:#60a5fa;
      stroke-width:1.6;
      opacity:.82;
      animation-delay:-1.2s;
    }

    .metric-track{
      fill:#e7edf4;
    }

    .metric-blue{
      fill:var(--blue-4);
      animation:metricPulse 4.8s ease-in-out infinite;
      transform-origin:left center;
      transform-box:fill-box;
    }

    .metric-amber{
      fill:var(--amber-2);
      animation:metricPulse 4.8s ease-in-out infinite;
      animation-delay:-1.2s;
      transform-origin:left center;
      transform-box:fill-box;
    }

    .metric-soft{
      fill:#93c5fd;
      animation:metricPulse 4.8s ease-in-out infinite;
      animation-delay:-.6s;
      transform-origin:left center;
      transform-box:fill-box;
    }

    @keyframes pulse{
      0%,100%{ opacity:.58; }
      50%{ opacity:1; }
    }

    @keyframes flow{
      0%{ stroke-dashoffset:0; }
      100%{ stroke-dashoffset:-64; }
    }

    @keyframes cellFloat{
      0%,100%{ transform:translate(0,0) scale(1); opacity:.92; }
      50%{ transform:translate(.35px,-.35px) scale(1.012); opacity:1; }
    }

    @keyframes metricPulse{
      0%,100%{ transform:scaleX(.76); opacity:.78; }
      50%{ transform:scaleX(1); opacity:1; }
    }

    @media (prefers-reduced-motion: reduce){
      .screen-fill-blue,
      .screen-fill-amber,
      .signal-ac,
      .signal-blue,
      .vision,
      .electrode-signal,
      .cell,
      .cell-outline,
      .data-line,
      .trend,
      .metric-blue,
      .metric-amber,
      .metric-soft{
        animation:none !important;
        stroke-dashoffset:0;
      }
    }
  </style>

  <defs>
    <radialGradient id="dish-fill" cx="48%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="75%" stop-color="#eaf3ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </radialGradient>

    <linearGradient id="electrode-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <radialGradient id="cell-fill" cx="35%" cy="25%" r="82%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="62%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </radialGradient>

    <radialGradient id="cell-fill-alt" cx="35%" cy="25%" r="82%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="62%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </radialGradient>

    <filter id="shadow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#93c5fd" flood-opacity=".11"/>
    </filter>

    <filter id="shadow-panel" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2563eb" flood-opacity=".08"/>
    </filter>

    <filter id="particle-shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy=".6" stdDeviation=".45" flood-color="#324a63" flood-opacity=".08"/>
    </filter>

    <filter id="blur-soft" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- left column: AquaSpecter EIS module -->
  <g>
    <rect x="88" y="122" width="118" height="78" rx="20" class="module-dark"/>
    <text x="104" y="142" class="label-strong" fill="#ffffff">AquaSpecter</text>
    <text x="104" y="155" class="tiny" fill="#9bb2ca">EIS control</text>

    <rect x="104" y="166" width="60" height="20" rx="7" class="screen"/>
    <path d="M113 174H155" class="screen-track"/>
    <path d="M113 174H143" class="screen-fill-blue"/>
    <path d="M113 181H155" class="screen-track"/>
    <path d="M113 181H137" class="screen-fill-amber"/>

    <circle cx="174" cy="172" r="3" fill="#22c55e"/>
    <circle cx="174" cy="182" r="3" fill="#f59e0b"/>

    <circle cx="206" cy="146" r="3.2" class="port"/>
    <circle cx="206" cy="160" r="3.2" class="port"/>
    <circle cx="206" cy="174" r="3.2" class="port"/>
  </g>

  <!-- left column: MAP-Bio camera module -->
  <g>
    <rect x="88" y="228" width="118" height="86" rx="20" class="module-light"/>
    <text x="104" y="248" class="label-strong">MAP-Bio</text>
    <text x="104" y="261" class="tiny">cell vision</text>

    <rect x="106" y="274" width="30" height="16" rx="5" fill="#eef5ff" stroke="#d8e3ef" stroke-width="1"/>
    <circle cx="160" cy="282" r="17" fill="#eff6ff" stroke="#bfd7ee" stroke-width="2"/>
    <circle cx="160" cy="282" r="8.5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.4"/>
    <circle cx="160" cy="282" r="3" fill="#2563eb"/>
    <path d="M106 301H188" stroke="#d7e2ee" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- center column: larger round culture dish -->
  <g>
    <ellipse cx="324" cy="230" rx="96" ry="78" class="dish-shadow"/>

    <circle cx="324" cy="224" r="72" class="dish-outer"/>
    <circle cx="324" cy="224" r="60" class="dish-inner"/>
    <circle cx="324" cy="224" r="50" class="dish-base"/>

    <!-- subtle small electrodes -->
    <rect x="286.7" y="168" width="4.6" height="24" rx="2.3" class="electrode"/>
    <rect x="321.8" y="164" width="4" height="20" rx="2" class="electrode" opacity=".58"/>
    <rect x="356.7" y="168" width="4.6" height="24" rx="2.3" class="electrode"/>

    <circle cx="289" cy="168" r="1.9" class="port"/>
    <circle cx="324" cy="164" r="1.7" class="port"/>
    <circle cx="359" cy="168" r="1.9" class="port"/>

    <path d="M289 173V190" class="electrode-signal amber"/>
    <path d="M359 173V190" class="electrode-signal blue"/>

    <!-- stylized adherent cells -->
    <g>
      <path
        d="M287 214
           C294 209 304 209 311 214
           C316 218 316 224 312 228
           C307 233 297 234 290 231
           C283 228 281 220 287 214Z"
        class="cell"
      />
      <path
        d="M287 214
           C294 209 304 209 311 214
           C316 218 316 224 312 228
           C307 233 297 234 290 231
           C283 228 281 220 287 214Z"
        class="cell-outline"
      />
      <ellipse cx="300" cy="221" rx="2.8" ry="2" class="nucleus"/>
    </g>

    <g>
      <path
        d="M314 226
           C322 220 334 220 341 225
           C346 230 346 236 342 240
           C336 245 325 245 317 242
           C311 239 308 231 314 226Z"
        class="cell alt"
      />
      <path
        d="M314 226
           C322 220 334 220 341 225
           C346 230 346 236 342 240
           C336 245 325 245 317 242
           C311 239 308 231 314 226Z"
        class="cell-outline"
        style="animation-delay:-1.2s"
      />
      <ellipse cx="329" cy="232" rx="2.8" ry="2" class="nucleus alt"/>
    </g>

    <g>
      <path
        d="M341 211
           C349 206 360 207 367 212
           C372 216 373 222 369 226
           C364 231 354 232 347 229
           C340 226 336 217 341 211Z"
        class="cell"
        style="animation-delay:-2s"
      />
      <path
        d="M341 211
           C349 206 360 207 367 212
           C372 216 373 222 369 226
           C364 231 354 232 347 229
           C340 226 336 217 341 211Z"
        class="cell-outline"
        style="animation-delay:-2s"
      />
      <ellipse cx="355" cy="219" rx="2.7" ry="1.9" class="nucleus"/>
    </g>

    <g>
      <path
        d="M299 241
           C306 236 316 236 322 240
           C327 244 327 249 324 253
           C319 257 309 258 302 255
           C296 252 294 246 299 241Z"
        class="cell"
        style="animation-delay:-2.8s"
      />
      <path
        d="M299 241
           C306 236 316 236 322 240
           C327 244 327 249 324 253
           C319 257 309 258 302 255
           C296 252 294 246 299 241Z"
        class="cell-outline"
        style="animation-delay:-2.8s"
      />
      <ellipse cx="311" cy="247" rx="2.6" ry="1.8" class="nucleus"/>
    </g>

    <g>
      <path
        d="M331 243
           C338 238 349 239 356 243
           C361 247 361 252 357 256
           C352 260 342 261 335 258
           C329 255 326 248 331 243Z"
        class="cell alt"
        style="animation-delay:-.8s"
      />
      <path
        d="M331 243
           C338 238 349 239 356 243
           C361 247 361 252 357 256
           C352 260 342 261 335 258
           C329 255 326 248 331 243Z"
        class="cell-outline"
        style="animation-delay:-.8s"
      />
      <ellipse cx="345" cy="249" rx="2.7" ry="1.9" class="nucleus alt"/>
    </g>

    <text x="272" y="145" class="label">Adherent cell culture</text>
  </g>

  <!-- lighter EIS leads into dish -->
  <g>
    <path d="M206 146C229 146 245 151 258 159C269 165 278 167 289 168" class="lead"/>
    <path d="M206 160C229 160 247 162 267 163C288 164 305 164 324 164" class="lead-light"/>
    <path d="M206 174C231 174 250 174 274 173C300 172 326 171 359 168" class="lead"/>

    <path d="M214 146C238 147 257 156 289 168" class="signal-ac"/>
    <path d="M214 174C246 174 284 173 359 168" class="signal-blue"/>
  </g>

  <!-- MAP-Bio vision cone from camera lens to cell layer -->
  <g>
    <path
      d="M160 282
         L286 210
         C307 220 314 249 298 272
         Z"
      class="vision-cone"
    />

    <path
      d="M160 282
         C195 272 237 247 292 228"
      class="vision"
    />

    <path
      d="M160 282
         C194 284 238 266 296 248"
      class="vision"
      style="animation-delay:-1.1s"
    />
  </g>

  <!-- dish to dashboard -->
  <path
    d="M396 224
       C417 224 433 216 449 210
       C458 206 463 204 466 204"
    class="data-line"
  />

  <!-- right column: supervision dashboard -->
  <g>
    <rect x="466" y="136" width="112" height="172" rx="22" class="panel"/>

    <text x="482" y="157" class="label-strong">Culture panel</text>
    <line x1="482" y1="166" x2="562" y2="166" class="divider"/>

    <text x="482" y="182" class="small">Growth trend</text>
    <path d="M482 221H562" class="axis"/>
    <path d="M482 221V190" class="axis"/>
    <path d="M494 209H560" class="grid"/>
    <path
      d="M486 215
         C496 212 505 205 514 207
         C524 209 531 198 541 197
         C550 196 555 198 562 191"
      class="trend"
    />
    <path
      d="M486 218
         C496 218 506 214 515 211
         C525 207 533 208 542 203
         C551 199 555 201 562 196"
      class="trend soft"
    />

    <text x="482" y="239" class="small">Impedance</text>
    <rect x="482" y="245" width="58" height="7" rx="3.5" class="metric-track"/>
    <rect x="482" y="245" width="43" height="7" rx="3.5" class="metric-blue"/>

    <text x="482" y="261" class="small">Morphology</text>
    <rect x="482" y="267" width="58" height="7" rx="3.5" class="metric-track"/>
    <rect x="482" y="267" width="35" height="7" rx="3.5" class="metric-amber"/>

    <text x="482" y="283" class="small">Confluence</text>
    <rect x="482" y="289" width="58" height="7" rx="3.5" class="metric-track"/>
    <rect x="482" y="289" width="39" height="7" rx="3.5" class="metric-soft"/>

    <text x="546" y="239" class="tiny">stable</text>
    <text x="546" y="261" class="tiny">tracked</text>
    <text x="546" y="283" class="tiny">rising</text>
  </g>
</svg>