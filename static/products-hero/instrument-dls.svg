      <stop offset="1" stop-color="#2563eb" stop-opacity=".88"/>
    </linearGradient>
  </defs>
  <rect x="88" y="146" width="96" height="38" rx="18" fill="#0f172a"/>
  <rect x="104" y="224" width="30" height="112" rx="14" fill="#e2e8f0"/>
