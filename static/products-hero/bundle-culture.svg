    @keyframes packetA{0%{transform:translateX(0);opacity:.15}20%{opacity:1}100%{transform:translateX(58px);opacity:.15}}
    @keyframes cellA{0%,100%{transform:translate(0,0)}50%{transform:translate(0,-4px)}}
    @keyframes trendA{0%,100%{opacity:.56}50%{opacity:1}}
