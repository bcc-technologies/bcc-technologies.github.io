<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="75 95 535 300"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">MAP-Nano: Dense particle cloud to particle distribution</title>
  <desc id="desc">
    Ilustración SVG ligera de MAP-Nano: una nube compacta de partículas se transforma
    en una distribución medible mostrada como histograma con ajuste estadístico.
  </desc>

  <style>
    :root{
      --ink-3:#324a63;
      --ink-2:#5f7e9e;
      --blue:#2563eb;
      --accent:#ed4624;
    }

    .label{
      font:600 10.5px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-2);
      letter-spacing:.05px;
    }

    .label-strong{
      font:700 11px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-3);
      letter-spacing:.05px;
    }

    .label-accent{
      font:700 10.5px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--accent);
      letter-spacing:.05px;
    }

    .axis-label{
      font:600 9.5px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:rgba(95,126,158,.72);
      letter-spacing:.04px;
    }

    .field-glow{
      fill:rgba(37,99,235,.038);
      filter:url(#field-blur);
      animation:cloudBreathe 8s ease-in-out infinite;
      transform-origin:center;
      transform-box:fill-box;
    }

    .grain{
      fill:url(#grain-gradient);
      stroke:rgba(50,74,99,.11);
      stroke-width:.72;
      filter:url(#particle-soft-depth);
      transform-origin:center;
      transform-box:fill-box;
    }

    .grain.light{
      fill:url(#grain-light-gradient);
      stroke:rgba(50,74,99,.09);
    }

    .grain.mid{
      fill:url(#grain-gradient);
    }

    .grain.dark{
      fill:url(#grain-dark-gradient);
      stroke:rgba(50,74,99,.13);
    }

    .grain.tiny{
      fill:url(#grain-tiny-gradient);
      stroke:none;
      opacity:.54;
      filter:url(#particle-tiny-depth);
    }

    .float-a{ animation:floatA 8.2s ease-in-out infinite; }
    .float-b{ animation:floatB 9.1s ease-in-out infinite; }
    .float-c{ animation:floatC 7.4s ease-in-out infinite; }
    .pulse-a{ animation:pulseA 5.8s ease-in-out infinite; }
    .pulse-b{ animation:pulseB 6.4s ease-in-out infinite; }
    .twinkle{ animation:twinkle 4.8s ease-in-out infinite; }

    .scale-bar{
      stroke:rgba(50,74,99,.42);
      stroke-width:1.6;
      stroke-linecap:round;
    }

    .scale-text{
      font:700 8px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:rgba(50,74,99,.50);
    }

    .extraction-line{
      fill:none;
      stroke:rgba(95,126,158,.22);
      stroke-width:1.8;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:5 12;
      animation:dataDash 7s linear infinite;
    }

    .axis{
      stroke:rgba(95,126,158,.24);
      stroke-width:1.25;
      stroke-linecap:round;
    }

    .axis-grid{
      stroke:rgba(95,126,158,.085);
      stroke-width:1;
      stroke-linecap:round;
    }

    .hist-bar{
      fill:url(#bar-gradient);
      rx:4;
    }

    .fit-fill{
      fill:url(#fit-fill-gradient);
      opacity:.46;
    }

    .fit-shadow{
      fill:none;
      stroke:rgba(237,70,36,.10);
      stroke-width:5.5;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .fit-curve{
      fill:none;
      stroke:var(--accent);
      stroke-width:2.35;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:230;
      stroke-dashoffset:230;
      animation:drawFit 5.4s ease-in-out infinite;
    }

    .fit-label-leader{
      fill:none;
      stroke:rgba(237,70,36,.34);
      stroke-width:1;
      stroke-linecap:round;
    }

    @keyframes drawFit{
      0%{ stroke-dashoffset:230; opacity:.38; }
      45%{ stroke-dashoffset:0; opacity:1; }
      100%{ stroke-dashoffset:0; opacity:.84; }
    }

    @keyframes cloudBreathe{
      0%,100%{ transform:scale(1); opacity:.84; }
      50%{ transform:scale(1.025); opacity:1; }
    }

    @keyframes floatA{
      0%,100%{ transform:translate(0,0); }
      50%{ transform:translate(3px,-2px); }
    }

    @keyframes floatB{
      0%,100%{ transform:translate(0,0); }
      50%{ transform:translate(-3px,2px); }
    }

    @keyframes floatC{
      0%,100%{ transform:translate(0,0); }
      50%{ transform:translate(2px,3px); }
    }

    @keyframes pulseA{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.035); }
    }

    @keyframes pulseB{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.025); }
    }

    @keyframes twinkle{
      0%,100%{ opacity:.48; }
      50%{ opacity:.72; }
    }

    @keyframes dataDash{
      0%{ stroke-dashoffset:0; }
      100%{ stroke-dashoffset:-84; }
    }

    @media (prefers-reduced-motion: reduce){
      .field-glow,
      .float-a,
      .float-b,
      .float-c,
      .pulse-a,
      .pulse-b,
      .twinkle,
      .extraction-line,
      .fit-curve{
        animation:none !important;
        stroke-dashoffset:0;
      }
    }
  </style>

  <defs>
    <radialGradient id="grain-light-gradient" cx="34%" cy="25%" r="76%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="38%" stop-color="#f7fbff"/>
      <stop offset="76%" stop-color="#dde8f4"/>
      <stop offset="100%" stop-color="#b9cadd"/>
    </radialGradient>

    <radialGradient id="grain-gradient" cx="34%" cy="25%" r="76%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="34%" stop-color="#eef5fb"/>
      <stop offset="74%" stop-color="#c9d8e8"/>
      <stop offset="100%" stop-color="#92aac3"/>
    </radialGradient>

    <radialGradient id="grain-dark-gradient" cx="32%" cy="24%" r="78%">
      <stop offset="0%" stop-color="#f5faff"/>
      <stop offset="36%" stop-color="#d6e2ee"/>
      <stop offset="76%" stop-color="#9eb3c9"/>
      <stop offset="100%" stop-color="#7189a1"/>
    </radialGradient>

    <radialGradient id="grain-tiny-gradient" cx="34%" cy="25%" r="76%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="62%" stop-color="#c8d6e5"/>
      <stop offset="100%" stop-color="#91a8bf"/>
    </radialGradient>

    <linearGradient id="bar-gradient" x1="0" y1="205" x2="0" y2="322" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity=".62"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity=".34"/>
    </linearGradient>

    <linearGradient id="fit-fill-gradient" x1="400" y1="166" x2="588" y2="324" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity=".04"/>
      <stop offset="54%" stop-color="#93c5fd" stop-opacity=".13"/>
      <stop offset="100%" stop-color="#ed4624" stop-opacity=".09"/>
    </linearGradient>

    <filter id="field-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="particle-soft-depth" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="1.2" stdDeviation=".9" flood-color="#324a63" flood-opacity=".12"/>
    </filter>

    <filter id="particle-tiny-depth" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy=".7" stdDeviation=".55" flood-color="#324a63" flood-opacity=".08"/>
    </filter>
  </defs>

  <!-- Dense particle cloud -->
  <g transform="translate(205 218) scale(.90) translate(-211 -221)">
    <path
      d="
        M114 138
        C140 112 183 101 224 106
        C273 111 311 137 323 180
        C336 227 317 276 272 303
        C227 330 164 329 125 297
        C88 266 84 181 114 138 Z"
      class="field-glow"
    />

    <!-- core particles -->
    <ellipse cx="132" cy="138" rx="12" ry="8" transform="rotate(-9 132 138)" class="grain light pulse-a"/>
    <ellipse cx="158" cy="133" rx="9" ry="6" transform="rotate(12 158 133)" class="grain mid float-a"/>
    <ellipse cx="182" cy="141" rx="14" ry="9" transform="rotate(-4 182 141)" class="grain pulse-b"/>
    <ellipse cx="208" cy="132" rx="11" ry="7" transform="rotate(10 208 132)" class="grain light float-b"/>
    <ellipse cx="232" cy="141" rx="9" ry="6" transform="rotate(-14 232 141)" class="grain mid twinkle"/>
    <ellipse cx="256" cy="133" rx="13" ry="8" transform="rotate(8 256 133)" class="grain dark float-a"/>
    <ellipse cx="281" cy="142" rx="10" ry="7" transform="rotate(-6 281 142)" class="grain light pulse-b"/>

    <ellipse cx="121" cy="164" rx="8" ry="5" transform="rotate(5 121 164)" class="grain tiny twinkle"/>
    <ellipse cx="144" cy="167" rx="12" ry="8" transform="rotate(-13 144 167)" class="grain mid float-b"/>
    <ellipse cx="171" cy="170" rx="17" ry="11" transform="rotate(9 171 170)" class="grain dark pulse-a"/>
    <ellipse cx="198" cy="165" rx="10" ry="7" transform="rotate(-8 198 165)" class="grain light"/>
    <ellipse cx="223" cy="171" rx="15" ry="10" transform="rotate(11 223 171)" class="grain float-c"/>
    <ellipse cx="249" cy="164" rx="11" ry="7" transform="rotate(-5 249 164)" class="grain mid pulse-b"/>
    <ellipse cx="276" cy="172" rx="17" ry="11" transform="rotate(9 276 172)" class="grain dark float-a"/>
    <ellipse cx="302" cy="166" rx="9" ry="6" transform="rotate(-10 302 166)" class="grain light"/>

    <ellipse cx="116" cy="193" rx="9" ry="6" transform="rotate(-7 116 193)" class="grain mid float-a"/>
    <ellipse cx="140" cy="195" rx="13" ry="8" transform="rotate(8 140 195)" class="grain light pulse-b"/>
    <ellipse cx="166" cy="198" rx="10" ry="7" transform="rotate(-12 166 198)" class="grain light"/>
