<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none">
  <style>
    .cell{fill:url(#cell-fill);stroke:#d6e2ee;stroke-width:3}
    .cell-soft{fill:url(#cell-soft);stroke:#d6e2ee;stroke-width:3}
    .nucleus{fill:#2563eb;fill-opacity:.18}
    .halo{stroke:#60a5fa;stroke-width:4;stroke-opacity:.26;fill:none;animation:haloPulse 4.8s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
    .pulse{animation:cellPulse 5.2s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
    .drift-a{animation:driftA 8.6s ease-in-out infinite}
    .drift-b{animation:driftB 7.2s ease-in-out infinite}
    .signal{stroke:#d9e7f4;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:2 12;animation:signalFlow 8s linear infinite}
    @keyframes haloPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.14);opacity:.68}}
    @keyframes cellPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    @keyframes driftA{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-6px)}}
    @keyframes driftB{0%,100%{transform:translate(0,0)}50%{transform:translate(-7px,5px)}}
    @keyframes signalFlow{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-70}}
    @media (prefers-reduced-motion: reduce){.halo,.pulse,.drift-a,.drift-b,.signal{animation:none!important}}
  </style>
  <defs>
    <radialGradient id="cell-fill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) scale(1)">
      <stop stop-color="#f8fbff"/>
      <stop offset=".7" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </radialGradient>
    <radialGradient id="cell-soft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) scale(1)">
      <stop stop-color="#fff7ed"/>
      <stop offset=".72" stop-color="#fed7aa"/>
      <stop offset="1" stop-color="#fde68a"/>
    </radialGradient>
  </defs>

  <path d="M116 220C146 180 188 164 232 174C269 182 304 205 332 244" class="signal" opacity=".78"/>
  <path d="M318 154C356 136 398 139 438 166C470 188 495 223 512 268" class="signal" opacity=".62"/>

  <g class="drift-a">
    <ellipse cx="180" cy="236" rx="82" ry="66" class="cell pulse"/>
    <ellipse cx="180" cy="236" rx="44" ry="34" class="nucleus"/>
    <ellipse cx="180" cy="236" rx="100" ry="82" class="halo"/>
    <circle cx="146" cy="214" r="8" fill="#60a5fa" fill-opacity=".42"/>
    <circle cx="214" cy="258" r="10" fill="#2563eb" fill-opacity=".24"/>
  </g>

  <g class="drift-b">
    <ellipse cx="302" cy="182" rx="60" ry="46" class="cell-soft pulse" style="animation-delay:-1.2s"/>
    <ellipse cx="302" cy="182" rx="28" ry="22" class="nucleus"/>
    <ellipse cx="302" cy="182" rx="74" ry="58" class="halo" style="animation-delay:-1.1s"/>
  </g>

  <g class="drift-a">
    <ellipse cx="320" cy="310" rx="72" ry="58" class="cell pulse" style="animation-delay:-2.4s"/>
    <ellipse cx="320" cy="310" rx="34" ry="26" class="nucleus"/>
    <ellipse cx="320" cy="310" rx="88" ry="70" class="halo" style="animation-delay:-2s"/>
    <circle cx="286" cy="292" r="8" fill="#1d4ed8" fill-opacity=".22"/>
    <circle cx="352" cy="332" r="9" fill="#60a5fa" fill-opacity=".28"/>
  </g>

  <g class="drift-b">
    <ellipse cx="470" cy="234" rx="94" ry="74" class="cell pulse" style="animation-delay:-.8s"/>
    <ellipse cx="470" cy="234" rx="48" ry="36" class="nucleus"/>
    <ellipse cx="470" cy="234" rx="114" ry="88" class="halo" style="animation-delay:-1.8s"/>
    <circle cx="430" cy="204" r="9" fill="#f59e0b" fill-opacity=".54"/>
    <circle cx="508" cy="196" r="12" fill="#2563eb" fill-opacity=".24"/>
    <circle cx="520" cy="264" r="10" fill="#93c5fd" fill-opacity=".34"/>
  </g>

  <g class="drift-a">
    <ellipse cx="524" cy="116" rx="36" ry="28" class="cell-soft pulse" style="animation-delay:-2.6s"/>
    <ellipse cx="524" cy="116" rx="15" ry="12" class="nucleus"/>
  </g>

  <g class="drift-b">
    <ellipse cx="114" cy="126" rx="34" ry="26" class="cell pulse" style="animation-delay:-1.6s"/>
    <ellipse cx="114" cy="126" rx="14" ry="10" class="nucleus"/>
  </g>
</svg>