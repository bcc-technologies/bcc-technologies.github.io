<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="55 80 570 325"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Microscopía computacional: referencia, análisis y defecto detectado</title>
  <desc id="desc">
    Escena SVG de análisis celular computacional con tres estados:
    una célula normal de referencia, una célula bajo análisis con modelo geométrico cohesivo,
    y una célula defectuosa detectada con un pequeño panel analítico.
  </desc>

  <style>
    :root{
      --blue-0:#f8fbff;
      --blue-1:#dcecff;
      --blue-2:#acd4ff;
      --blue-3:#60a5fa;
      --blue-4:#2563eb;
      --blue-5:#1e3a8a;

      --coral-0:#fff2ed;
      --coral-1:#ffc4b2;
      --coral-2:#ed4624;
      --coral-3:#b92f1b;

      --ink-0:#c9d8e8;
      --ink-1:#9fb8d4;
      --ink-2:#5f7e9e;
      --ink-3:#324a63;

      --soft-blue:rgba(59,130,246,.14);
      --soft-coral:rgba(237,70,36,.15);

      --line-blue:rgba(59,130,246,.84);
      --line-coral:rgba(237,70,36,.92);

      --pipeline:rgba(95,126,158,.28);

      --panel-fill:rgba(255,255,255,.84);
      --panel-stroke:rgba(50,74,99,.14);
    }

    .pipeline{
      fill:none;
      stroke:var(--pipeline);
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:3 10;
      animation:pipelineFlow 10s linear infinite;
    }

    .cell-normal{
      fill:url(#cell-normal-fill);
      stroke:var(--ink-0);
      stroke-width:3;
      filter:url(#shadow-blue);
    }

    .cell-defect{
      fill:url(#cell-defect-fill);
      stroke:#e6b6a9;
      stroke-width:3;
      filter:url(#shadow-coral);
    }

    .nucleus-normal{
      fill:var(--blue-5);
      fill-opacity:.14;
      stroke:var(--blue-4);
      stroke-opacity:.08;
      stroke-width:1.5;
    }

    .nucleus-defect{
      fill:var(--coral-2);
      fill-opacity:.14;
      stroke:var(--coral-2);
      stroke-opacity:.18;
      stroke-width:1.5;
    }

    .contour-soft{
      fill:none;
      stroke-width:11;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .contour-soft.normal{
      stroke:var(--soft-blue);
    }

    .contour-soft.defect{
      stroke:var(--soft-coral);
    }

    .contour-trace{
      fill:none;
      stroke-width:3.1;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:12 12;
      animation:traceFlow 6.6s linear infinite;
    }

    .contour-trace.normal{
      stroke:var(--line-blue);
      opacity:.88;
    }

    .contour-trace.defect{
      stroke:var(--line-coral);
      animation-duration:5.1s;
      opacity:.98;
    }

    .pulse{
      animation:cellPulse 5.8s ease-in-out infinite;
      transform-origin:center;
      transform-box:fill-box;
    }

    .analysis-model{
      opacity:.98;
    }

    .fit-ellipse{
      fill:none;
      stroke:rgba(37,99,235,.16);
      stroke-width:1.5;
      stroke-dasharray:5 5;
    }

    .measure-line{
      stroke:rgba(37,99,235,.36);
      stroke-width:2;
      stroke-linecap:round;
    }

    .measure-line.soft{
      stroke:rgba(37,99,235,.18);
      stroke-width:1.4;
      stroke-dasharray:4 5;
    }

    .measure-node{
      fill:#ffffff;
      stroke:var(--blue-4);
      stroke-width:1.8;
    }

    .landmark{
      fill:#ffffff;
      stroke:rgba(37,99,235,.72);
      stroke-width:1.5;
    }

    .centroid{
      fill:var(--blue-4);
      stroke:#ffffff;
      stroke-width:1.4;
    }

    .hotspot-ring{
      fill:none;
      stroke:var(--coral-2);
      stroke-width:2.8;
      stroke-linecap:round;
      stroke-dasharray:6 5;
      animation:hotspotPulse 2.8s ease-in-out infinite;
    }

    .hotspot-fill{
      fill:rgba(237,70,36,.08);
      stroke:none;
    }

    .hotspot-landmark{
      fill:#ffffff;
      stroke:var(--coral-2);
      stroke-width:2;
    }

    .panel{
      fill:var(--panel-fill);
      stroke:var(--panel-stroke);
      stroke-width:1.5;
      filter:url(#panel-shadow);
    }

    .panel-title{
      font:600 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-3);
      letter-spacing:.1px;
    }

    .panel-label{
      font:500 11px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-2);
    }

    .panel-value{
      font:700 11px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-3);
    }

    .panel-value.alert{
      fill:var(--coral-2);
    }

    .panel-divider{
      stroke:rgba(50,74,99,.10);
      stroke-width:1;
    }

    .badge{
      fill:rgba(237,70,36,.08);
      stroke:rgba(237,70,36,.20);
      stroke-width:1;
    }

    .badge-text{
      font:700 10px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--coral-2);
      letter-spacing:.2px;
    }

    .callout{
      fill:none;
      stroke:rgba(237,70,36,.42);
      stroke-width:2;
      stroke-linecap:round;
      stroke-dasharray:4 5;
    }

    .callout-dot{
      fill:var(--coral-2);
    }

    .micro-label{
      font:600 10.5px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-2);
      letter-spacing:.15px;
    }

    @keyframes cellPulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.022); }
    }

    @keyframes traceFlow{
      0%{ stroke-dashoffset:0; }
      100%{ stroke-dashoffset:-92; }
    }

    @keyframes pipelineFlow{
      0%{ stroke-dashoffset:0; }
      100%{ stroke-dashoffset:-80; }
    }

    @keyframes hotspotPulse{
      0%,100%{ opacity:.72; }
      50%{ opacity:1; }
    }

    @media (prefers-reduced-motion: reduce){
      .pulse,
      .contour-trace,
      .pipeline,
      .hotspot-ring{
        animation:none !important;
      }
    }
  </style>

  <defs>
    <radialGradient id="cell-normal-fill" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="60%" stop-color="#dcecff"/>
      <stop offset="100%" stop-color="#acd4ff"/>
    </radialGradient>

    <radialGradient id="cell-defect-fill" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#fff2ed"/>
      <stop offset="64%" stop-color="#ffc4b2"/>
      <stop offset="100%" stop-color="#ed4624"/>
    </radialGradient>

    <filter id="shadow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#93c5fd" flood-opacity=".14"/>
    </filter>

    <filter id="shadow-coral" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#ed4624" flood-opacity=".14"/>
    </filter>

    <filter id="panel-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2563eb" flood-opacity=".08"/>
    </filter>

    <path id="cell-reference-shape" d="
      M140 150
      C178 148 212 173 219 205
      C228 244 204 278 165 285
      C125 293 89 272 78 239
      C67 205 82 170 114 157
      C122 153 131 151 140 150 Z" />

    <path id="cell-analysis-shape" d="
      M310 252
      C343 250 373 270 378 300
      C384 333 360 361 326 364
      C287 367 253 343 247 312
      C240 280 268 255 310 252 Z" />

    <path id="cell-defect-shape" d="
      M490 130
      C535 130 567 160 573 196
      C578 228 561 258 533 271
      C518 278 503 282 489 280
      C474 279 462 274 452 265
      C444 258 437 250 428 249
      C418 248 409 245 403 238
      C396 230 393 219 394 206
      C396 175 420 145 455 135
      C466 132 478 130 490 130 Z" />

    <path id="defect-hotspot-region" d="
      M423 236
      C432 231 442 233 450 241
      C446 251 437 256 427 253
      C421 249 419 243 423 236 Z" />
  </defs>

  <path
    d="M208 221
       C240 228 263 243 281 264
       C294 280 307 289 323 290
       C347 291 379 276 411 243
       C431 223 450 210 470 207"
    class="pipeline"
  />

  <g>
    <use href="#cell-reference-shape" class="contour-soft normal"/>
    <use href="#cell-reference-shape" class="contour-trace normal"/>

    <g class="pulse">
      <use href="#cell-reference-shape" class="cell-normal"/>
      <ellipse cx="149" cy="217" rx="38" ry="28" class="nucleus-normal"/>
    </g>

    <text x="96" y="314" class="micro-label">Reference</text>
    <text x="96" y="329" class="panel-label">Normal morphology</text>
  </g>

  <g>
    <use href="#cell-analysis-shape" class="contour-soft normal"/>
    <use href="#cell-analysis-shape" class="contour-trace normal"/>

    <g class="pulse" style="animation-delay:-1.2s">
      <use href="#cell-analysis-shape" class="cell-normal"/>
      <ellipse cx="309" cy="307" rx="29" ry="22" class="nucleus-normal"/>
    </g>

    <g class="analysis-model">
      <ellipse
        cx="311"
        cy="309"
        rx="54"
        ry="38"
        transform="rotate(20 311 309)"
        class="fit-ellipse"
      />

      <line
        x1="260"
        y1="290"
        x2="362"
        y2="328"
        class="measure-line"
      />

      <line
        x1="334"
        y1="274"
        x2="288"
        y2="344"
        class="measure-line soft"
      />

      <circle cx="311" cy="309" r="5.5" class="centroid"/>
      <circle cx="260" cy="290" r="4.4" class="measure-node"/>
      <circle cx="362" cy="328" r="4.4" class="measure-node"/>
      <circle cx="334" cy="274" r="3.8" class="landmark"/>
      <circle cx="288" cy="344" r="3.8" class="landmark"/>
    </g>

    <text x="268" y="386" class="micro-label">Feature analysis</text>
  </g>

  <g>
    <use href="#cell-defect-shape" class="contour-soft defect"/>
    <use href="#cell-defect-shape" class="contour-trace defect"/>

    <g class="pulse" style="animation-delay:-.6s">
      <use href="#cell-defect-shape" class="cell-defect"/>
      <ellipse cx="491" cy="203" rx="41" ry="29" class="nucleus-defect"/>

      <use href="#defect-hotspot-region" class="hotspot-fill"/>

      <path
        d="M423 236
           C432 231 442 233 450 241
           C446 251 437 256 427 253
           C421 249 419 243 423 236 Z"
        class="hotspot-ring"
      />

      <circle cx="429" cy="240" r="4.2" class="hotspot-landmark"/>
      <circle cx="444" cy="242" r="4.2" class="hotspot-landmark"/>
      <circle cx="435" cy="249" r="4.2" class="hotspot-landmark"/>
    </g>

    <rect x="444" y="97" width="98" height="24" rx="12" class="badge"/>
    <text x="493" y="112.5" text-anchor="middle" class="badge-text">DEFECT DETECTED</text>
  </g>

  <g>
    <path d="M450 244 C472 242 489 247 503 258" class="callout"/>
    <circle cx="450" cy="244" r="4" class="callout-dot"/>

    <rect x="416" y="262" width="182" height="116" rx="16" class="panel"/>

    <text x="434" y="286" class="panel-title">Morphology report</text>
    <line x1="434" y1="296" x2="580" y2="296" class="panel-divider"/>

    <text x="434" y="317" class="panel-label">Contour</text>
    <text x="580" y="317" text-anchor="end" class="panel-value">Detected</text>

    <text x="434" y="336" class="panel-label">Circularity</text>
    <text x="580" y="336" text-anchor="end" class="panel-value alert">Low</text>

    <text x="434" y="355" class="panel-label">Defect score</text>
    <text x="580" y="355" text-anchor="end" class="panel-value alert">0.87</text>

    <text x="434" y="374" class="panel-label">Status</text>
    <text x="580" y="374" text-anchor="end" class="panel-value alert">Irregular edge</text>
  </g>
</svg>