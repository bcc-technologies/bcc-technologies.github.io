    <ellipse cx="161" cy="241" rx="7" ry="4.8" transform="rotate(-9 161 241)" class="grain tiny"/>
    <ellipse cx="188" cy="240" rx="6.2" ry="4.1" transform="rotate(7 188 240)" class="grain tiny"/>
    <ellipse cx="214" cy="242" rx="6.8" ry="4.5" transform="rotate(-8 214 242)" class="grain tiny twinkle"/>
    <ellipse cx="242" cy="241" rx="7.2" ry="4.8" transform="rotate(6 242 241)" class="grain tiny"/>
    <ellipse cx="270" cy="242" rx="6.2" ry="4.1" transform="rotate(-7 270 242)" class="grain tiny"/>
    <ellipse cx="296" cy="239" rx="6.5" ry="4.3" transform="rotate(9 296 239)" class="grain tiny twinkle"/>

    <ellipse cx="147" cy="270" rx="6.4" ry="4.2" transform="rotate(-6 147 270)" class="grain tiny"/>
    <ellipse cx="173" cy="272" rx="7.2" ry="4.8" transform="rotate(8 173 272)" class="grain tiny twinkle"/>
    <ellipse cx="199" cy="271" rx="6.2" ry="4.1" transform="rotate(-9 199 271)" class="grain tiny"/>
    <ellipse cx="279" cy="271" rx="6.2" ry="4.1" transform="rotate(8 279 271)" class="grain tiny"/>

    <!-- scale -->
    <path d="M218 334H258" class="scale-bar"/>
    <text x="238" y="328" text-anchor="middle" class="scale-text">100 nm</text>
  </g>

  <path
    d="M300 216
       C342 220 380 237 411 259
       C434 278 453 296 472 306"
    class="extraction-line"
  />

  <!-- Histogram -->
  <g>
    <text x="408" y="184" class="label-strong">312 particles</text>
    <text x="588" y="184" text-anchor="end" class="label-strong">mean 38 nm</text>

    <path d="M408 322H588" class="axis"/>
    <path d="M408 322V212" class="axis"/>

    <path d="M424 292H572" class="axis-grid"/>
    <path d="M444 262H552" class="axis-grid"/>
    <path d="M468 232H530" class="axis-grid"/>

    <text
      x="392"
      y="267"
      text-anchor="middle"
      transform="rotate(-90 392 267)"
      class="axis-label"
    >frequency</text>

    <text x="498" y="344" text-anchor="middle" class="axis-label">particle diameter</text>
    <text x="571" y="344" class="axis-label">nm</text>

    <path
      d="
        M408 322
        C426 318 439 296 453 268
        C471 231 491 209 510 220
        C535 235 550 286 588 322
        Z"
      class="fit-fill"
    />

    <rect x="420" y="307" width="12" height="15" rx="4" class="hist-bar"/>
    <rect x="434" y="292" width="12" height="30" rx="4" class="hist-bar"/>
    <rect x="448" y="268" width="12" height="54" rx="4" class="hist-bar"/>
    <rect x="462" y="241" width="12" height="81" rx="4" class="hist-bar"/>
    <rect x="476" y="222" width="12" height="100" rx="4" class="hist-bar"/>
    <rect x="490" y="216" width="12" height="106" rx="4" class="hist-bar"/>
    <rect x="504" y="232" width="12" height="90" rx="4" class="hist-bar"/>
    <rect x="518" y="255" width="12" height="67" rx="4" class="hist-bar"/>
    <rect x="532" y="281" width="12" height="41" rx="4" class="hist-bar"/>
    <rect x="546" y="301" width="12" height="21" rx="4" class="hist-bar"/>
    <rect x="560" y="313" width="12" height="9" rx="4" class="hist-bar"/>

    <path
      d="
        M410 313
        C428 309 442 289 456 259
        C473 223 493 205 511 218
        C535 238 548 287 586 313"
      class="fit-shadow"
    />
    <path
      d="
        M410 313
        C428 309 442 289 456 259
        C473 223 493 205 511 218
        C535 238 548 287 586 313"
      class="fit-curve"
    />

    <path
      d="M527 236 C518 232 512 226 507 219"
      class="fit-label-leader"
    />
    <text x="531" y="239" class="label-accent">log-normal fit</text>

    <text x="588" y="365" text-anchor="end" class="label">confidence 0.94</text>
  </g>
</svg>