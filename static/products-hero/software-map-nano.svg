<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" fill="none">
  <style>
    .mesh{stroke:#c8d6e8;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    .surface-line{stroke:#e6edf5;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;opacity:.82}
    .surface-a{fill:url(#nano-surface-a)}
    .surface-b{fill:url(#nano-surface-b)}
    .surface-c{fill:url(#nano-surface-c)}
    .beam{fill:url(#nano-beam);animation:beamSweep 6.6s ease-in-out infinite;transform-origin:252px 142px;transform-box:fill-box}
    .spark{animation:particlePulse 4.8s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
    .drift{animation:driftY 8.2s ease-in-out infinite}
    .glow{animation:haloPulse 5.1s ease-in-out infinite;transform-origin:center;transform-box:fill-box}
    @keyframes beamSweep{0%,100%{transform:translateX(-10px);opacity:.42}50%{transform:translateX(18px);opacity:.84}}
    @keyframes particlePulse{0%,100%{transform:scale(1);opacity:.72}50%{transform:scale(1.16);opacity:1}}
    @keyframes driftY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes haloPulse{0%,100%{transform:scale(1);opacity:.34}50%{transform:scale(1.18);opacity:.64}}
    @media (prefers-reduced-motion: reduce){.beam,.spark,.drift,.glow{animation:none!important}}
  </style>
  <defs>
    <linearGradient id="nano-surface-a" x1="116" y1="176" x2="364" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset=".56" stop-color="#f97316"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="nano-surface-b" x1="104" y1="236" x2="358" y2="332" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fb923c" stop-opacity=".94"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity=".82"/>
    </linearGradient>
    <linearGradient id="nano-surface-c" x1="150" y1="294" x2="352" y2="364" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a8a" stop-opacity=".22"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity=".3"/>
    </linearGradient>
    <linearGradient id="nano-beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe" stop-opacity="0"/>
      <stop offset=".38" stop-color="#dbeafe" stop-opacity=".2"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity=".58"/>
    </linearGradient>
    <radialGradient id="nano-core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) scale(1)">
      <stop stop-color="#fff7ed"/>
      <stop offset=".58" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </radialGradient>
  </defs>

  <g class="drift">
    <path class="surface-a" d="M102 246C138 204 182 183 228 184C273 185 317 208 358 248C322 270 287 289 248 302C204 317 159 320 118 302C101 286 96 267 102 246Z"/>
    <path class="surface-b" d="M112 290C148 261 190 248 236 250C278 252 320 268 360 300C325 324 287 339 244 346C202 352 163 344 128 322C114 312 108 301 112 290Z"/>
    <path class="surface-c" d="M138 324C171 310 207 304 245 306C280 308 315 318 350 338C316 354 279 364 238 368C203 371 171 365 143 350C136 344 134 335 138 324Z"/>
    <path d="M130 226C164 206 198 198 234 200C273 202 309 216 342 240" class="surface-line"/>
    <path d="M128 292C164 272 201 264 240 266C278 269 313 282 345 305" class="surface-line" opacity=".62"/>
  </g>

  <path class="beam" d="M238 112C246 104 258 104 266 112L292 140C296 144 296 152 292 157L256 208C252 214 244 214 240 208L204 157C200 152 200 144 204 140L238 112Z"/>
  <circle cx="248" cy="226" r="9" fill="#fff7ed"/>
  <circle cx="248" cy="226" r="18" stroke="#93c5fd" stroke-opacity=".48" stroke-width="3" class="glow"/>

  <g opacity=".78">
    <path class="mesh" d="M420 166L456 144L492 166L492 208L456 230L420 208Z"/>
    <path class="mesh" d="M492 166L528 144L564 166L564 208L528 230L492 208Z"/>
    <path class="mesh" d="M456 230L492 208L528 230L528 272L492 294L456 272Z"/>
    <path class="mesh" d="M384 230L420 208L456 230L456 272L420 294L384 272Z"/>
    <circle cx="456" cy="144" r="9" fill="#dbeafe" class="spark"/>
    <circle cx="528" cy="144" r="9" fill="#bfdbfe" class="spark" style="animation-delay:-1.1s"/>
    <circle cx="420" cy="208" r="9" fill="#93c5fd" class="spark" style="animation-delay:-1.8s"/>
    <circle cx="492" cy="208" r="11" fill="#2563eb" class="spark" style="animation-delay:-.6s"/>
    <circle cx="564" cy="208" r="9" fill="#60a5fa" class="spark" style="animation-delay:-2.4s"/>
    <circle cx="456" cy="272" r="10" fill="#f59e0b" class="spark" style="animation-delay:-1.5s"/>
    <circle cx="528" cy="272" r="10" fill="#f97316" class="spark" style="animation-delay:-2.1s"/>
    <circle cx="420" cy="294" r="8" fill="#dbeafe" class="spark" style="animation-delay:-.9s"/>
    <circle cx="492" cy="294" r="8" fill="#bfdbfe" class="spark" style="animation-delay:-2.7s"/>
  </g>

  <g>
    <circle cx="184" cy="170" r="15" fill="#f59e0b" class="spark"/>
    <circle cx="212" cy="152" r="10" fill="#fb923c" class="spark" style="animation-delay:-1.2s"/>
    <circle cx="298" cy="196" r="12" fill="#60a5fa" class="spark" style="animation-delay:-2.1s"/>
    <circle cx="330" cy="220" r="8" fill="#93c5fd" class="spark" style="animation-delay:-.8s"/>
    <circle cx="158" cy="314" r="12" fill="#dbeafe" class="spark" style="animation-delay:-1.6s"/>
    <circle cx="286" cy="336" r="14" fill="#f59e0b" fill-opacity=".88" class="spark" style="animation-delay:-2.8s"/>
  </g>
</svg>