  <circle cx="370" cy="238" r="5" fill="#93c5fd" class="dot" style="animation-delay:-1.8s"/>
  <rect x="420" y="128" width="138" height="184" rx="28" fill="#f7fbff" stroke="#d7e2ee" stroke-width="3"/>
  <path d="M444 278H534" stroke="#e1e8f0" stroke-width="8" stroke-linecap="round"/>
