<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="70 100 525 260"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">AquaSpecter EIS flow: analyzer, connected electrodes, electrochemical cell and impedance response</title>
  <desc id="desc">
    Simplified SVG illustrating electrochemical impedance spectroscopy:
    AquaSpecter connects directly to electrodes in an electrolyte sample,
    applies an AC perturbation, and converts the measured response into an impedance curve.
  </desc>

  <style>
    :root{
      --ink-0:#d7e2ee;
      --ink-1:#9bb2ca;
      --ink-2:#5f7e9e;
      --ink-3:#324a63;

      --blue-0:#f8fbff;
      --blue-1:#dbeafe;
      --blue-2:#93c5fd;
      --blue-3:#60a5fa;
      --blue-4:#2563eb;

      --amber-1:#fde68a;
      --amber-2:#f59e0b;

      --panel-fill:rgba(255,255,255,.92);
      --panel-stroke:rgba(50,74,99,.14);
      --grid:rgba(95,126,158,.08);
    }

    .label{
      font:600 10.5px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-2);
      letter-spacing:.08px;
    }

    .label-strong{
      font:700 11px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:var(--ink-3);
      letter-spacing:.08px;
    }

    .small{
      font:600 9px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:rgba(95,126,158,.78);
      letter-spacing:.04px;
    }

    .tiny{
      font:700 8px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:rgba(95,126,158,.78);
      letter-spacing:.03px;
    }

    .screen-tiny{
      font:700 6.8px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:#5f7e9e;
      letter-spacing:.04px;
    }

    .screen-micro{
      font:700 6.2px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      fill:#324a63;
      letter-spacing:.04px;
    }

    .device{
      fill:#0f172a;
      filter:url(#shadow-soft);
    }

    .screen{
      fill:#eff6ff;
      stroke:#c9d8e8;
      stroke-width:1.5;
    }

    .screen-card{
      fill:#ffffff;
      stroke:#d8e3ef;
      stroke-width:1;
    }

    .screen-track{
      stroke:#d7e2ee;
      stroke-width:3;
      stroke-linecap:round;
    }

    .screen-fill-blue{
      stroke:var(--blue-4);
      stroke-width:3;
      stroke-linecap:round;
      animation:pulseCurve 4.6s ease-in-out infinite;
    }

    .screen-fill-amber{
      stroke:var(--amber-2);
      stroke-width:3;
      stroke-linecap:round;
      animation:pulseCurve 4.6s ease-in-out infinite;
      animation-delay:-1.2s;
    }

    .screen-dot{
      animation:ledPulse 2.8s ease-in-out infinite;
    }

    .led{
      animation:ledPulse 2.8s ease-in-out infinite;
    }

    .knob{ fill:#111827; }
    .knob-core{ fill:#94a3b8; }

    .lead{
      fill:none;
      stroke:#8ea4ba;
      stroke-width:3.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .lead-thin{
      fill:none;
      stroke:#b5c5d6;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .signal-ac{
      fill:none;
      stroke:var(--amber-2);
      stroke-width:2.8;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:10 12;
      animation:waveFlow 5.2s linear infinite;
    }

    .signal-return{
      fill:none;
      stroke:var(--blue-4);
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:10 12;
      animation:waveFlow 6.1s linear infinite reverse;
    }

    .cell-outer{
      fill:#ffffff;
      stroke:#bfd7ee;
      stroke-width:3;
      filter:url(#shadow-soft);
    }

    .liquid{
      fill:url(#liquid-fill);
    }

    .liquid-surface{
      fill:none;
      stroke:rgba(37,99,235,.34);
      stroke-width:2;
      stroke-linecap:round;
    }

    .cell-halo{
      fill:rgba(37,99,235,.08);
      filter:url(#blur-soft);
      animation:haloPulse 4.8s ease-in-out infinite;
      transform-origin:center;
      transform-box:fill-box;
    }

    .electrode{
      fill:url(#electrode-fill);
      stroke:#8aa4bf;
      stroke-width:1.4;
    }

    .reference-electrode{
      fill:#eaf2fb;
      stroke:#8aa4bf;
      stroke-width:1.2;
    }

    .electrode-signal{
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-dasharray:5 7;
      animation:fieldFlow 6.2s linear infinite;
      opacity:.9;
    }

    .electrode-signal.amber{
      stroke:var(--amber-2);
    }

    .electrode-signal.blue{
      stroke:var(--blue-4);
    }

    .port{
      fill:#ffffff;
      stroke:#8aa4bf;
      stroke-width:1.2;
    }

    .charge{
      fill:url(#charge-fill);
      stroke:rgba(50,74,99,.08);
      stroke-width:.4;
      filter:url(#particle-shadow);
      transform-origin:center;
      transform-box:fill-box;
      opacity:.78;
    }

    .charge.alt{
      fill:url(#charge-fill-alt);
    }

    .drift-a{ animation:driftA 6.2s ease-in-out infinite; }
    .drift-b{ animation:driftB 5.6s ease-in-out infinite; }
    .drift-c{ animation:driftC 7.1s ease-in-out infinite; }

    .field-wave{
      fill:none;
      stroke:rgba(245,158,11,.34);
      stroke-width:2.5;
      stroke-linecap:round;
      stroke-dasharray:5 7;
      animation:fieldFlow 6.6s linear infinite;
    }

    .flow-line{
      fill:none;
      stroke:rgba(95,126,158,.20);
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:4 10;
      animation:dataFlow 7.8s linear infinite;
    }

    .panel{
      fill:var(--panel-fill);
      stroke:var(--panel-stroke);
      stroke-width:1.5;
      filter:url(#shadow-panel);
    }

    .axis{
      stroke:rgba(95,126,158,.24);
      stroke-width:1.2;
      stroke-linecap:round;
    }

    .grid{
      stroke:var(--grid);
      stroke-width:1;
    }

    .nyquist-shadow{
      fill:none;
      stroke:rgba(37,99,235,.10);
      stroke-width:7;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .nyquist-main{
      fill:none;
      stroke:var(--blue-4);
      stroke-width:2.8;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:180;
      stroke-dashoffset:180;
      animation:drawCurve 5.5s ease-in-out infinite;
    }

    .nyquist-tail{
      fill:none;
      stroke:var(--amber-2);
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:100;
      stroke-dashoffset:100;
      animation:drawCurve 5.5s ease-in-out infinite;
      animation-delay:-.7s;
      opacity:.92;
    }

    .metric-track{
      fill:#e7edf4;
    }

    .metric-blue{
      fill:var(--blue-4);
      animation:metricPulse 4.8s ease-in-out infinite;
      transform-origin:left center;
      transform-box:fill-box;
    }

    .metric-amber{
      fill:var(--amber-2);
      animation:metricPulse 4.8s ease-in-out infinite;
      animation-delay:-1.1s;
      transform-origin:left center;
      transform-box:fill-box;
    }

    .panel-divider{
      stroke:rgba(50,74,99,.10);
      stroke-width:1;
    }

    @keyframes pulseCurve{
      0%,100%{ opacity:.56; }
      50%{ opacity:1; }
    }

    @keyframes ledPulse{
      0%,100%{ opacity:.42; }
      50%{ opacity:1; }
    }

    @keyframes waveFlow{
      0%{ stroke-dashoffset:0; opacity:.78; }
      100%{ stroke-dashoffset:-90; opacity:.94; }
    }

    @keyframes dataFlow{
      0%{ stroke-dashoffset:0; }
      100%{ stroke-dashoffset:-72; }
    }

    @keyframes haloPulse{
      0%,100%{ opacity:.72; transform:scale(1); }
      50%{ opacity:1; transform:scale(1.025); }
    }

    @keyframes driftA{
      0%,100%{ transform:translate(0,0); }
      50%{ transform:translate(1.8px,-2.2px); }
    }

    @keyframes driftB{
      0%,100%{ transform:translate(0,0); }
      50%{ transform:translate(-2px,1.6px); }
    }

    @keyframes driftC{
      0%,100%{ transform:translate(0,0); }
      50%{ transform:translate(1.1px,2.1px); }
    }

    @keyframes fieldFlow{
      0%{ stroke-dashoffset:0; }
      100%{ stroke-dashoffset:-60; }
    }

    @keyframes drawCurve{
      0%{ stroke-dashoffset:180; opacity:.42; }
      45%{ stroke-dashoffset:0; opacity:1; }
      100%{ stroke-dashoffset:0; opacity:.86; }
    }

    @keyframes metricPulse{
      0%,100%{ transform:scaleX(.72); opacity:.72; }
      50%{ transform:scaleX(1); opacity:1; }
    }

    @media (prefers-reduced-motion: reduce){
      .screen-fill-blue,
      .screen-fill-amber,
      .screen-dot,
      .led,
      .signal-ac,
      .signal-return,
      .flow-line,
      .cell-halo,
      .charge,
      .field-wave,
      .electrode-signal,
      .nyquist-main,
      .nyquist-tail,
      .metric-blue,
      .metric-amber{
        animation:none !important;
        stroke-dashoffset:0;
      }
    }
  </style>

  <defs>
    <linearGradient id="liquid-fill" x1="0" y1="170" x2="0" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="56%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>

    <linearGradient id="electrode-fill" x1="0" y1="150" x2="0" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <radialGradient id="charge-fill" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="68%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </radialGradient>

    <radialGradient id="charge-fill-alt" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="68%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>

    <filter id="shadow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#93c5fd" flood-opacity=".12"/>
    </filter>

    <filter id="shadow-panel" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2563eb" flood-opacity=".08"/>
    </filter>

    <filter id="particle-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy=".7" stdDeviation=".5" flood-color="#324a63" flood-opacity=".10"/>
    </filter>

    <filter id="blur-soft" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- AquaSpecter unit -->
  <g>
    <rect x="86" y="125" width="138" height="208" rx="28" class="device"/>

    <text x="108" y="151" class="label-strong" fill="#ffffff">AquaSpecter</text>

    <rect x="106" y="180" width="98" height="62" rx="14" class="screen"/>

    <!-- screen UI -->
    <rect x="114" y="188" width="28" height="12" rx="4" class="screen-card"/>
    <text x="128" y="196.5" text-anchor="middle" class="screen-micro">EIS</text>

    <text x="150" y="196.5" class="screen-tiny">SWEEP</text>
    <circle cx="192" cy="194" r="3" fill="#22c55e" class="screen-dot"/>

    <path d="M116 208H196" class="screen-track"/>
    <path d="M116 208H171" class="screen-fill-blue"/>

    <path d="M116 218H196" class="screen-track"/>
    <path d="M116 218H159" class="screen-fill-amber"/>

    <rect x="116" y="226" width="80" height="10" rx="5" fill="#ffffff" stroke="#d8e3ef" stroke-width="1"/>
    <circle cx="160" cy="231" r="3.6" fill="#2563eb" class="screen-dot"/>
    <path d="M128 231H152" stroke="#d7e2ee" stroke-width="2" stroke-linecap="round"/>
    <path d="M168 231H186" stroke="#d7e2ee" stroke-width="2" stroke-linecap="round"/>

    <circle cx="116" cy="266" r="5.8" fill="#22c55e" class="led"/>
    <circle cx="196" cy="266" r="5.8" fill="#f59e0b" class="led" style="animation-delay:-1.2s"/>

    <circle cx="155" cy="301" r="20" class="knob"/>
    <circle cx="155" cy="301" r="7" class="knob-core"/>

    <!-- output ports -->
    <circle cx="224" cy="214" r="4.3" class="port"/>
    <circle cx="224" cy="232" r="4.3" class="port"/>
    <circle cx="224" cy="250" r="4.3" class="port"/>
  </g>

  <!-- direct connections from instrument to cell -->
  <g>
    <!-- physical leads -->
    <path d="M224 214C250 214 269 184 294 166C304 159 311 157 320 157" class="lead"/>
    <path d="M224 232C252 232 272 201 300 184C316 174 330 169 348 169" class="lead-thin"/>
    <path d="M224 250C254 250 275 228 299 209C319 193 342 175 365 163" class="lead"/>

    <!-- animated signal overlays -->
    <path d="M232 214C248 214 264 188 282 176C294 168 306 162 320 157" class="signal-ac"/>
    <path d="M232 250C252 250 272 229 294 211C317 193 341 176 365 163" class="signal-return"/>
  </g>

  <!-- electrochemical cell -->
  <g>
    <ellipse cx="345" cy="226" rx="76" ry="86" class="cell-halo"/>

    <rect x="304" y="135" width="92" height="182" rx="24" class="cell-outer"/>

    <path
      d="M315 198
         C333 190 351 204 371 196
         C380 193 386 195 386 195
         V304
         H315
         Z"
      class="liquid"
    />
    <path
      d="M315 198
         C333 190 351 204 371 196
         C380 193 386 195 386 195"
      class="liquid-surface"
    />

    <!-- readable electrodes -->
    <rect x="320" y="156" width="13" height="134" rx="6.5" class="electrode"/>
    <rect x="365" y="156" width="13" height="134" rx="6.5" class="electrode"/>
    <rect x="345" y="168" width="7" height="92" rx="3.5" class="reference-electrode"/>

    <!-- connection nodes -->
    <circle cx="326.5" cy="157" r="3.2" class="port"/>
    <circle cx="348.5" cy="169" r="2.8" class="port"/>
    <circle cx="371.5" cy="163" r="3.2" class="port"/>

    <!-- signal traces on electrodes -->
    <path d="M326.5 164V286" class="electrode-signal amber"/>
    <path d="M371.5 164V286" class="electrode-signal blue"/>

    <text x="314" y="128" class="small">electrochemical cell</text>

    <!-- interface / electrolyte cues -->
    <path d="M335 218C343 209 352 209 360 218" class="field-wave"/>
    <path d="M335 244C343 235 352 235 360 244" class="field-wave" style="animation-delay:-1.5s"/>

    <circle cx="336" cy="212" r="4.5" class="charge alt drift-a"/>
    <circle cx="358" cy="212" r="4.2" class="charge drift-b"/>
    <circle cx="342" cy="237" r="4" class="charge drift-c"/>
    <circle cx="356" cy="267" r="4" class="charge alt drift-c"/>
  </g>

  <!-- impedance response signal -->
  <g>
    <path
      d="M396 220
         C410 220 420 218 431 214
         C441 210 451 206 462 206"
      class="flow-line"
    />
  </g>

  <!-- analysis panel -->
  <g>
    <rect x="448" y="128" width="128" height="206" rx="22" class="panel"/>

    <text x="466" y="152" class="label-strong">Impedance</text>
    <text x="466" y="166" class="label">response</text>
    <line x1="466" y1="176" x2="558" y2="176" class="panel-divider"/>

    <!-- Nyquist plot -->
    <text x="466" y="193" class="small">Nyquist plot</text>
    <text x="548" y="193" text-anchor="end" class="tiny">Z(ω)</text>

    <path d="M466 258H556" class="axis"/>
    <path d="M466 258V208" class="axis"/>
    <path d="M480 246H552" class="grid"/>
    <path d="M480 232H552" class="grid"/>

    <text x="558" y="270" class="tiny">Z′</text>
    <text x="456" y="210" class="tiny">−Z″</text>

    <path
      d="M472 257
         C482 228 497 213 514 213
         C531 213 543 231 550 251
         C552 256 554 258 556 258"
      class="nyquist-shadow"
    />
    <path
      d="M472 257
         C482 228 497 213 514 213
         C531 213 543 231 550 251
         C552 256 554 258 556 258"
      class="nyquist-main"
    />
    <path
      d="M472 257
         C489 254 511 254 556 258"
      class="nyquist-tail"
    />

    <!-- simplified metrics -->
    <text x="466" y="292" class="small">interface parameters</text>

    <rect x="466" y="302" width="76" height="8" rx="4" class="metric-track"/>
    <rect x="466" y="302" width="56" height="8" rx="4" class="metric-blue"/>

    <rect x="466" y="318" width="76" height="8" rx="4" class="metric-track"/>
    <rect x="466" y="318" width="44" height="8" rx="4" class="metric-amber"/>

    <text x="548" y="309" text-anchor="end" class="tiny">Rct</text>
    <text x="548" y="325" text-anchor="end" class="tiny">Cdl</text>
  </g>
</svg>