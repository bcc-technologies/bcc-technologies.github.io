    @keyframes fillA{0%,100%{transform:scaleX(.62)}50%{transform:scaleX(1)}}
    @keyframes checkA{0%,100%{opacity:.38}50%{opacity:1}}
    @media (prefers-reduced-motion: reduce){.packet,.curve,.fill,.check{animation:none!important}}
