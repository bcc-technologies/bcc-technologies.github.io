<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña - BCC</title>
  <link rel="stylesheet" href="css/00-tokens.css">
  <link rel="stylesheet" href="css/01-base.css">
  <link rel="stylesheet" href="css/02-layout.css">
  <link rel="stylesheet" href="css/03-components.css">
  <link rel="stylesheet" href="css/pages/login.css">
  <script src="js/prefs.js" defer></script>
  <script src="js/supabase-config.js" defer></script>
  <script src="js/auth.js" defer></script>
</head>
<body>
  <main class="login-container with-header-offset">
    <section class="login-card">
      <h1>Recuperar contraseña</h1>
      <p>Escribe el correo de tu cuenta BCC. Te enviaremos un enlace para crear una contraseña nueva.</p>
      <form data-forgot-password-form>
        <p class="auth-message" data-auth-message hidden></p>
        <input type="email" name="email" autocomplete="email" placeholder="Correo de la cuenta" required />
        <button type="submit">enviar enlace <span class="arrow">→</span></button>
      </form>
      <p class="register-link"><a href="/login.html">Volver al login</a></p>
    </section>
  </main>
</body>
</html>
