<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña - BCC</title>
  <link rel="stylesheet" href="css/00-tokens.css">
  <link rel="stylesheet" href="css/01-base.css">
  <link rel="stylesheet" href="css/02-layout.css">
  <link rel="stylesheet" href="css/03-components.css">
  <link rel="stylesheet" href="css/pages/login.css">
  <script src="js/supabase-config.js" defer></script>
  <script src="js/auth.js" defer></script>
</head>
<body>
  <main class="login-container with-header-offset">
    <section class="login-card">
      <h1>Nueva contraseña</h1>
      <p data-reset-status>Validando enlace de recuperación...</p>
      <form data-reset-password-form>
        <p class="auth-message" data-auth-message hidden></p>
        <input type="password" name="password" autocomplete="new-password" placeholder="Nueva contraseña" required minlength="8" />
        <input type="password" name="confirmPassword" autocomplete="new-password" placeholder="Confirmar contraseña" required minlength="8" />
        <button type="submit">guardar contraseña <span class="arrow">→</span></button>
      </form>
    </section>
  </main>
</body>
</html>
